<!DOCTYPE html>
<html>
<head>
    <title>User Form</title>
    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .form-box {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            text-align: center;
        }

        input {
            width: 250px;
            padding: 10px;
            margin: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 20px;
            border: none;
            background: #4CAF50;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }
    </style>
</head>
<body>

<div class="form-box">
    <h2>User Information</h2>

    <form action="process.php" method="POST">
        
        <!-- Username (max 20 characters) -->
        <input type="text" name="username" maxlength="20" placeholder="Username (max 20)" required><br>

        <!-- Fullname (max 200 characters) -->
        <input type="text" name="fullname" maxlength="200" placeholder="Full Name (max 200)" required><br>

        <!-- Password (max 10 characters) -->
        <input type="password" name="password" maxlength="10" placeholder="Password (max 10)" required><br>

        <button type="submit">Submit</button>
    </form>
</div>

</body>
</html>
